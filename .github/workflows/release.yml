name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - configuration: Release.R19
            tfm: net48
            artifact_tag: R19
          - configuration: Release.R21
            tfm: net48
            artifact_tag: R21
          - configuration: Release.R24
            tfm: net48
            artifact_tag: R24
          - configuration: Release.R25
            tfm: net8.0-windows
            artifact_tag: R25
          - configuration: Release.R26
            tfm: net8.0-windows
            artifact_tag: R26
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: nuget-

      - name: Publish SmartCon ${{ matrix.artifact_tag }}
        run: dotnet publish src/SmartCon.App/SmartCon.App.csproj -c ${{ matrix.configuration }} -f ${{ matrix.tfm }} -o artifacts/publish/SmartCon-${{ matrix.artifact_tag }}

      - name: Remove RevitAPI/AdWindows from output
        shell: pwsh
        run: |
          Remove-Item "artifacts/publish/SmartCon-${{ matrix.artifact_tag }}/RevitAPI*.dll" -ErrorAction SilentlyContinue
          Remove-Item "artifacts/publish/SmartCon-${{ matrix.artifact_tag }}/AdWindows*.dll" -ErrorAction SilentlyContinue
          Remove-Item "artifacts/publish/SmartCon-${{ matrix.artifact_tag }}/UIAutomation*.dll" -ErrorAction SilentlyContinue

      - name: Upload SmartCon ${{ matrix.artifact_tag }} artifact
        uses: actions/upload-artifact@v7
        with:
          name: SmartCon-${{ matrix.artifact_tag }}
          path: artifacts/publish/SmartCon-${{ matrix.artifact_tag }}/**/*
          if-no-files-found: warn

  updater:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: nuget-

      - name: Publish SmartCon.Updater
        run: dotnet publish src/SmartCon.Updater/SmartCon.Updater.csproj -c Release -f net8.0 -o artifacts/publish/SmartCon.Updater

      - name: Upload Updater artifact
        uses: actions/upload-artifact@v7
        with:
          name: SmartCon-Updater
          path: artifacts/publish/SmartCon.Updater/**/*
          if-no-files-found: warn

  tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: nuget-

      - name: Run tests
        run: dotnet test src/SmartCon.Tests/SmartCon.Tests.csproj -c Release.R25

  github-release:
    runs-on: windows-latest
    needs: [tests, publish, updater]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Create ZIP archives with Updater
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $updaterDir = "release-artifacts\SmartCon-Updater"

          foreach ($dir in Get-ChildItem -Path release-artifacts -Directory -Exclude "SmartCon-Updater") {
            # Copy Updater into each version folder (mirrors release.ps1 behaviour)
            if (Test-Path $updaterDir) {
              Copy-Item "$updaterDir\SmartCon.Updater.exe" "$($dir.FullName)\" -Force -ErrorAction SilentlyContinue
              Copy-Item "$updaterDir\SmartCon.Updater.dll" "$($dir.FullName)\" -Force -ErrorAction SilentlyContinue
              Copy-Item "$updaterDir\SmartCon.Updater.deps.json" "$($dir.FullName)\" -Force -ErrorAction SilentlyContinue
              Copy-Item "$updaterDir\SmartCon.Updater.runtimeconfig.json" "$($dir.FullName)\" -Force -ErrorAction SilentlyContinue
            }

            $zipName = "SmartCon-$tag-$($dir.Name).zip"
            Compress-Archive -Path "$($dir.FullName)\*" -DestinationPath $zipName -Force
            $sizeMB = [math]::Round((Get-Item $zipName).Length / 1MB, 1)
            Write-Host "Created $zipName ($sizeMB MB)"
          }

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: SmartCon-${{ github.ref_name }}-*.zip
          generate_release_notes: true
